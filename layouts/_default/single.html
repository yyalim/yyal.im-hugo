<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ .Description | default .Site.Params.description }}" />
  <title>{{ .Title }} — {{ .Site.Title }}</title>
  <meta property="og:type" content="article">
  <meta property="og:title" content="{{ .Title }}">
  <meta property="og:description" content="{{ .Description | default .Site.Params.description }}">
  <meta property="og:url" content="{{ .Permalink }}">
  <meta property="og:site_name" content="{{ .Site.Title }}">
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="{{ .Title }}">
  <meta name="twitter:description" content="{{ .Description | default .Site.Params.description }}">
  {{ $styles := resources.Get "scss/styles.scss" | toCSS | minify }}
  <style>{{ $styles.Content | safeCSS }}</style>
</head>
<body>
  <main class="page-container">
    <p class="home-link"><a href="/">← Yusuf Yalım</a></p>
    <h1 class="introduction">{{ .Title | lower }}</h1>
    {{ with .Lastmod }}
      <p class="page-meta">Last updated <time datetime="{{ .Format "2006-01-02" }}">{{ .Format "January 2, 2006" }}</time></p>
    {{ end }}
    <article class="page-content">
      {{ .Content }}
    </article>
  </main>
</body>
</html>
