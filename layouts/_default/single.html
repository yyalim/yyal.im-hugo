{{ define "main" }}
  <p class="home-link"><a href="/">← Yusuf Yalım</a></p>
  <h1 class="introduction">{{ .Title | lower }}</h1>
  {{ with .Lastmod }}
    <p class="page-meta">Last updated <time datetime="{{ .Format "2006-01-02" }}">{{ .Format "January 2, 2006" }}</time></p>
  {{ end }}
  <article class="page-content">
    {{ .Content }}
  </article>
{{ end }}
