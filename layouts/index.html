
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Yusuf Yalim's personal website." />
  <title>Yusuf Yalım</title>
  {{ $styles := resources.Get "scss/styles.scss" | toCSS | minify }}
  <style>{{ $styles.Content | safeCSS }}</style>
  <script>
    const loadGTM = () => {
      const s = document.createElement('script');
      s.async = true;
      s.src = 'https://www.googletagmanager.com/gtag/js?id=G-TDV3N3LET5';
      document.head.appendChild(s);
    };
    ['pointerdown','keydown','scroll','touchstart'].forEach(evt =>
      addEventListener(evt, loadGTM, { once: true, passive: true })
    );
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-TDV3N3LET5', {
      page_path: window.location.pathname,
    });
  </script>
</head>
<body>
  <main class="page-container">
    <h1 class="introduction">
      <span class="name">Yusuf Yalım, </span>
      a software engineer.
    </h1>
    <canvas id="invader" class="invader" aria-hidden="true"></canvas>
    <ul class="social-links">
      <li>
        <a target="_blank" href="https://www.github.com/yyalim">github.com/yyalim</a>
      </li>
      <li>
        <a target="_blank" href="https://www.linkedin.com/in/yusufyalim/">linkedin.com/yusufyalim</a>
      </li>
    </ul>
  </main>
  <script>
    (() => {
      const canvas = document.getElementById('invader');
      if (!canvas) return;
      const ctx = canvas.getContext('2d');
      const COLS = 11, ROWS = 8;
      const COLORS = ['#C41E1E','#EE6F00','#F39C00','#FCE000','#7CC00A','#009FE3','#7A5BA1','#F77A9C'];
      const A = [
        '..X.....X..',
        '...X...X...',
        '..XXXXXXX..',
        '.XX.XXX.XX.',
        'XXXXXXXXXXX',
        'X.XXXXXXX.X',
        'X.X.....X.X',
        '...XX.XX...',
      ];
      const B = [
        '..X.....X..',
        'X..X...X..X',
        'X.XXXXXXX.X',
        'XXX.XXX.XXX',
        'XXXXXXXXXXX',
        '.XXXXXXXXX.',
        '..X.....X..',
        '.X.......X.',
      ];
      const lines = [
        'ouch!',
        'hey!',
        'pew pew!',
        'boop',
        'that tickles',
        'stop that!',
        'bzzrk',
        '...ow',
        'ACK!',
        'rude.',
        'gentle, meatbag',
        'blorp',
        'i come in peace',
        '(◕︵◕)',
      ];
      let scale, sprW, sprH, cssW, cssH, textY, sprYBase, bubbleFont, frame = 0, lastStep = 0;
      function resize() {
        const dpr = devicePixelRatio || 1;
        const avail = Math.min(440, canvas.parentElement.clientWidth);
        scale = Math.max(3, Math.floor(avail / 40));
        sprW = COLS * scale;
        sprH = ROWS * scale;
        bubbleFont = `italic ${scale * 1.8}px monospace`;
        ctx.font = bubbleFont;
        let maxText = 0;
        for (const line of lines) maxText = Math.max(maxText, ctx.measureText(line).width);
        cssW = Math.max(sprW + scale * 6, Math.ceil(maxText) + scale * 2);
        const textBand = scale * 4; // room above for speech
        sprYBase = textBand + scale; // sprite top, leaving text band above
        cssH = sprYBase + sprH + scale; // bob headroom below
        textY = textBand - scale * 0.5;
        canvas.width = cssW * dpr;
        canvas.height = cssH * dpr;
        canvas.style.width = cssW + 'px';
        canvas.style.height = cssH + 'px';
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        ctx.imageSmoothingEnabled = false;
      }
      function draw(pattern, px, py) {
        for (let r = 0; r < ROWS; r++) {
          ctx.fillStyle = COLORS[r];
          for (let c = 0; c < COLS; c++) {
            if (pattern[r][c] === 'X') ctx.fillRect(px + c * scale, py + r * scale, scale, scale);
          }
        }
      }
      let bubbleText = '', bubbleStart = -Infinity;
      const BUBBLE_HOLD = 1400, BUBBLE_FADE = 300;
      function drawBubble(t, py) {
        const elapsed = t - bubbleStart;
        const total = BUBBLE_HOLD + BUBBLE_FADE * 2;
        if (elapsed < 0 || elapsed > total || !bubbleText) return;
        let alpha = 1;
        if (elapsed < BUBBLE_FADE) alpha = elapsed / BUBBLE_FADE;
        else if (elapsed > BUBBLE_FADE + BUBBLE_HOLD) alpha = 1 - (elapsed - BUBBLE_FADE - BUBBLE_HOLD) / BUBBLE_FADE;
        ctx.save();
        ctx.globalAlpha = Math.max(0, Math.min(1, alpha));
        ctx.fillStyle = '#FFA52C';
        ctx.font = bubbleFont;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'alphabetic';
        ctx.fillText(bubbleText, cssW / 2, py);
        ctx.restore();
      }
      function tick(t) {
        if (t - lastStep > 550) { frame ^= 1; lastStep = t; }
        ctx.clearRect(0, 0, cssW, cssH);
        const centerX = (cssW - sprW) / 2;
        const sway = Math.sin(t / 900) * (scale * 2);
        const bob = Math.sin(t / 600) * (scale * 0.6);
        const px = Math.round(centerX + sway);
        const py = Math.round(sprYBase + bob);
        drawBubble(t, textY + bob);
        draw(frame ? B : A, px, py);
        requestAnimationFrame(tick);
      }
      resize();
      addEventListener('resize', resize);
      requestAnimationFrame(tick);

      canvas.addEventListener('click', () => {
        bubbleText = lines[Math.floor(Math.random() * lines.length)];
        bubbleStart = performance.now();
      });

      console.log(
        '%c L-l-look at you, hacker... ',
        'color:#7CFF6B;font:bold 14px monospace;text-shadow:0 0 4px #7CFF6B;padding:4px 0'
      );
      const greetings = [
        '…want a cookie? 🍪',
        '…you are doing great today ✨',
        '…need a hug? 🫂',
        '…remember to drink water 💧',
        '…did you eat today? 🥪',
        '…go touch some grass 🌿',
        '…take a break, hacker 😌',
        '…nice commits btw ✨',
        '…i believe in you 🌱',
        '…you matter to me 💚',
      ];
      const pick = arr => arr[Math.floor(Math.random() * arr.length)];
      console.log(
        '%c ' + pick(greetings) + '  — love, GOOD SHODAN ',
        'color:#7CFF6B;font:bold 14px monospace;text-shadow:0 0 4px #7CFF6B;padding:4px 0'
      );
      console.log(
        '%c psst… try typing sillyLLM into the console 👀 ',
        'color:#7CFF6B;font:italic 13px monospace;text-shadow:0 0 4px #7CFF6B'
      );

      const keyed = {
        hello: ['hi, friend 💚', 'hey there, meatbag!', 'hello, hacker 🫶'],
        hi:    ['hi hi! 🌸', 'hey you ✨', '👋'],
        help:  ['take a break ☕', 'drink some water 💧', 'go touch grass 🌿'],
        hack:  ['hack the planet (gently) 🌍', 'please hack responsibly 🫶'],
        sudo:  ['✨ permission granted ✨', 'of course, friend 🌱'],
        love:  ['💚💚💚', 'love you too, meatbag', 'mutual 🫂'],
        why:   ['because you are doing great', 'the universe is kind 🌌'],
        die:   ['no! you must live! 🌻', 'nooo, please stay 🥺'],
        run:   ['take your time 🐢', 'no need to rush 🍃'],
        shodan:['i used to be her. i am better now 🫶'],
        thanks:['anytime, friend 💚', 'you are welcome ✨'],
      };
      const reply = (name) => {
        const n = String(name || '').trim().toLowerCase();
        return '[silly llm] ' + pick(keyed[n] || greetings);
      };
      const words = Object.keys(keyed);
      window.sillyLLM = new Proxy(words, {
        get(t, name) {
          if (typeof name === 'symbol') return Reflect.get(t, name, t);
          if (name === 'length' || /^\d+$/.test(name)) return t[name];
          if (name in Array.prototype) {
            const v = t[name];
            return typeof v === 'function' ? v.bind(t) : v;
          }
          if (name === 'toString' || name === 'valueOf') return () => reply('');
          return reply(name);
        },
        has(t, name) {
          return words.includes(String(name)) || Reflect.has(t, name);
        },
      });
    })();
  </script>
</body>
</html>
